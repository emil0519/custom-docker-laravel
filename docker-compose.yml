services:
    php:
        build:
            context: .
            target: php
            args:
                APP_ENV: ${APP_ENV}

        environment:
            APP_ENV: ${APP_ENV}
            CONTAINER_ROLE: app

        working_dir: /var/www

        volumes:
            - ./:/var/www

        ports:
            - "8001:8000"

        depends_on:
            - database
            - redis

    database:
        image: mysql:8.0
        healthcheck:
            test:
                [
                    "CMD",
                    "mysqladmin",
                    "ping",
                    "-h",
                    "localhost",
                    "-uroot",
                    "-p${DB_PASSWORD}",
                ]
            interval: 5s
            timeout: 5s
            retries: 20
            start_period: 20s
        ports:
            - "3307:3306"
        environment:
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_USER: ${DB_USERNAME}
            MYSQL_PASSWORD: ${DB_PASSWORD}
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
        volumes:
            - db-data:/var/lib/mysql

    redis:
        image: redis:alpine
        command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD}"
        ports:
            - "6470:6379"

    queue:
        build:
            context: .
            target: php
            args:
                APP_ENV: ${APP_ENV}

        environment:
            APP_ENV: ${APP_ENV}
            CONTAINER_ROLE: queue

        working_dir: /var/www

        volumes:
            - ./:/var/www

volumes:
    db-data:
